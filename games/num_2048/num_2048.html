<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048 Standard Edition</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            /* 격자와 타일이 공유하는 단일 기준값 (여기서만 수정하면 둘 다 함께 바뀜) */
            --board-pad: clamp(8px, 3vw, 12px);
            --board-gap: clamp(6px, 2.5vw, 12px);
        }

        body {
            background-color: #faf8ef;
            color: #776e65;
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 20px;
            touch-action: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: clamp(2.4rem, 10vw, 3.5rem);
            font-weight: bold;
            color: #776e65;
            line-height: 1;
        }

        .score-container {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background: #bbada0;
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            text-align: center;
            min-width: 64px;
        }

        .score-title {
            font-size: 0.62rem;
            text-transform: uppercase;
            color: #eee4da;
            font-weight: bold;
        }

        .score-value {
            font-size: clamp(1.05rem, 4vw, 1.3rem);
            font-weight: bold;
        }

        .above-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .game-intro {
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .restart-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .restart-btn:active {
            background: #7f6a56;
        }

        /* 게임 보드: 정사각형 유지, 화면 크기에 맞춰 자동 축소 */
        #game-board {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: #bbada0;
            border-radius: 6px;
        }

        /* 배경 격자와 타일 컨테이너가 동일한 grid 설정을 공유 → 완벽히 일치 */
        .grid-container,
        .tile-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: var(--board-gap);
            padding: var(--board-pad);
        }

        .grid-container {
            z-index: 1;
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tile-container {
            z-index: 2;
            pointer-events: none;
        }

        .tile {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.4rem, 6vw, 2rem);
            background: #eee4da;
            color: #776e65;
        }

        .tile-new {
            animation: appear 0.2s ease-in-out;
        }

        .tile-merged {
            animation: pop 0.15s ease-in-out alternate;
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        .tile-2 {
            background: #eee4da;
        }

        .tile-4 {
            background: #ede0c8;
        }

        .tile-8 {
            background: #f2b179;
            color: #f9f6f2;
        }

        .tile-16 {
            background: #f59563;
            color: #f9f6f2;
        }

        .tile-32 {
            background: #f67c5f;
            color: #f9f6f2;
        }

        .tile-64 {
            background: #f65e3b;
            color: #f9f6f2;
        }

        .tile-128 {
            background: #edcf72;
            color: #f9f6f2;
            font-size: clamp(1.15rem, 5vw, 1.7rem);
        }

        .tile-256 {
            background: #edcc61;
            color: #f9f6f2;
            font-size: clamp(1.15rem, 5vw, 1.7rem);
        }

        .tile-512 {
            background: #edc850;
            color: #f9f6f2;
            font-size: clamp(1.15rem, 5vw, 1.7rem);
        }

        .tile-1024 {
            background: #edc53f;
            color: #f9f6f2;
            font-size: clamp(0.95rem, 4vw, 1.4rem);
        }

        .tile-2048 {
            background: #edc22e;
            color: #f9f6f2;
            font-size: clamp(0.95rem, 4vw, 1.4rem);
        }

        .tile-super {
            background: #3c3a32;
            color: #f9f6f2;
            font-size: clamp(0.8rem, 3.5vw, 1.2rem);
        }

        /* 아주 좁은 화면(예: 320px대) 추가 보정 */
        @media (max-width: 360px) {
            .above-game {
                flex-direction: column;
                align-items: flex-start;
            }

            .restart-btn {
                align-self: stretch;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="top_box">
                <a href="../../index.html" class="home_ic">
                    ⬅
                </a>
                <h1>2048</h1>
            </div>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-title">SCORE</div>
                    <div id="score" class="score-value">0</div>
                </div>
                <div class="score-box">
                    <div class="score-title">BEST</div>
                    <div id="best-score" class="score-value">0</div>
                </div>
            </div>
        </header>

        <div class="above-game">
            <div class="game-intro">숫자를 합쳐 <strong>2048</strong>을 만드세요!</div>
            <button class="restart-btn" onclick="restartGame()">새 게임</button>
        </div>

        <div id="game-board">
            <div class="grid-container">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div id="tile-container" class="tile-container"></div>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 4;
        let board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
        let score = 0;
        let bestScore = 0;
        let mergedPositions = [];

        let touchStartX = 0;
        let touchStartY = 0;
        let touchActive = false;

        function initGame() {
            const savedBest = localStorage.getItem('2048_bestScore');
            bestScore = savedBest ? parseInt(savedBest) : 0;
            document.getElementById('best-score').innerText = bestScore;

            score = 0;
            document.getElementById('score').innerText = score;
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));

            addRandomTile();
            addRandomTile();
            renderBoard();
        }

        function restartGame() {
            initGame();
        }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) emptyCells.push({ r, c });
                }
            }
            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                return { r, c };
            }
            return null;
        }

        // 격자와 동일한 CSS Grid 좌표계(grid-row/grid-column)를 사용 → 어긋남 원천 차단
        function renderBoard() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';

            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const value = board[r][c];
                    if (value > 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${value}`;
                        if (value > 2048) tile.classList.add('tile-super');
                        tile.innerText = value;

                        tile.dataset.r = r;
                        tile.dataset.c = c;

                        // grid-row/column은 1부터 시작하므로 +1
                        tile.style.gridRow = r + 1;
                        tile.style.gridColumn = c + 1;

                        if (mergedPositions.some(p => p.r === r && p.c === c)) {
                            tile.classList.add('tile-merged');
                        }

                        container.appendChild(tile);
                    }
                }
            }
            mergedPositions = [];
        }

        function slide(row) {
            let filtered = row.filter(val => val !== 0);
            let mergedIndexes = [];

            for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i + 1]) {
                    filtered[i] *= 2;
                    score += filtered[i];
                    filtered[i + 1] = 0;
                    mergedIndexes.push(i);
                    i++;
                }
            }

            let result = [];
            let indexMap = [];
            for (let i = 0; i < filtered.length; i++) {
                if (filtered[i] !== 0) {
                    indexMap[i] = result.length;
                    result.push(filtered[i]);
                }
            }
            const finalMergedIndexes = mergedIndexes.map(i => indexMap[i]);

            while (result.length < BOARD_SIZE) {
                result.push(0);
            }

            return { row: result, mergedIndexes: finalMergedIndexes };
        }

        function move(direction) {
            let moved = false;
            const prevBoard = JSON.stringify(board);
            mergedPositions = [];

            if (direction === 'LEFT' || direction === 'RIGHT') {
                for (let r = 0; r < BOARD_SIZE; r++) {
                    let row = [...board[r]];
                    if (direction === 'RIGHT') row.reverse();

                    const { row: newRow, mergedIndexes } = slide(row);

                    mergedIndexes.forEach(idx => {
                        const c = direction === 'RIGHT' ? (BOARD_SIZE - 1 - idx) : idx;
                        mergedPositions.push({ r, c });
                    });

                    if (direction === 'RIGHT') newRow.reverse();
                    board[r] = newRow;
                }
            } else if (direction === 'UP' || direction === 'DOWN') {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    let col = [];
                    for (let r = 0; r < BOARD_SIZE; r++) col.push(board[r][c]);
                    if (direction === 'DOWN') col.reverse();

                    const { row: newCol, mergedIndexes } = slide(col);

                    mergedIndexes.forEach(idx => {
                        const r = direction === 'DOWN' ? (BOARD_SIZE - 1 - idx) : idx;
                        mergedPositions.push({ r, c });
                    });

                    if (direction === 'DOWN') newCol.reverse();
                    for (let r = 0; r < BOARD_SIZE; r++) {
                        board[r][c] = newCol[r];
                    }
                }
            }

            if (prevBoard !== JSON.stringify(board)) moved = true;

            if (moved) {
                const newTileCoord = addRandomTile();
                document.getElementById('score').innerText = score;

                if (score > bestScore) {
                    bestScore = score;
                    document.getElementById('best-score').innerText = bestScore;
                    localStorage.setItem('2048_bestScore', bestScore);
                }

                renderBoard();

                if (newTileCoord) {
                    setTimeout(() => {
                        const container = document.getElementById('tile-container');
                        const targetTile = container.querySelector(
                            `.tile[data-r="${newTileCoord.r}"][data-c="${newTileCoord.c}"]`
                        );
                        if (targetTile) {
                            targetTile.classList.add('tile-new');
                        }
                    }, 10);
                }

                if (isGameOver()) {
                    setTimeout(() => alert('게임 오버! 다시 도전해 보세요.'), 300);
                }
            }
        }

        function isGameOver() {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) return false;
                    if (r < BOARD_SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
                    if (c < BOARD_SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
                }
            }
            return true;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') { move('UP'); e.preventDefault(); }
            else if (e.key === 'ArrowDown') { move('DOWN'); e.preventDefault(); }
            else if (e.key === 'ArrowLeft') { move('LEFT'); e.preventDefault(); }
            else if (e.key === 'ArrowRight') { move('RIGHT'); e.preventDefault(); }
        });

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchActive = true;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (!touchActive) return;

            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;

            const threshold = 40;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) move('RIGHT');
                    else move('LEFT');
                }
            } else {
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0) move('DOWN');
                    else move('UP');
                }
            }
            touchActive = false;
        }, { passive: true });

        initGame();
    </script>
</body>

</html>
