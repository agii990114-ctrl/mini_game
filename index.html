<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Arcade Center</title>
    <style>
        /* 모든 요소에 부드러운 전환 트랜지션 적용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
        }

        /* -----------------------------------------
           1. 라이트 네온 테마 변수 고정
        ----------------------------------------- */
        :root {
            --bg-color: #f1f2f6;
            --text-color: #2f3542;
            --sub-text: #747d8c;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --card-border: #e4e7eb;
            --neon-accent: #0081ff;
            --neon-glow: rgba(0, 129, 255, 0.25);
            --title-gradient: linear-gradient(45deg, #0081ff, #00c6ff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: var(--title-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
        }

        header p {
            color: var(--sub-text);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* 게임 선택 카드 그리드 컨테이너 */
        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            width: 100%;
            max-width: 1100px;
        }

        /* 게임 카드 프리미엄 디자인 및 a 태그 스타일 초기화 */
        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            text-decoration: none; /* 링크 밑줄 제거 */
            color: var(--text-color);   /* 파란 글씨 색상 초기화 */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* 카드 마우스 호버 화려한 이펙트 */
        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--neon-accent);
            box-shadow: 0 15px 35px var(--neon-glow);
        }

        /* 호버 시 내부 아이콘 애니메이션 */
        .game-card:hover .game-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .game-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
        }

        .game-desc {
            font-size: 0.95rem;
            color: var(--sub-text);
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 장식용 네온 바텀 라인 */
        .game-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--title-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .game-card:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Arcade</h1>
        <p>원하는 미니게임을 선택하여 실행하세요</p>
    </header>

    <!-- 게임 카드가 정렬되는 본문 그리드 영역 -->
    <main class="game-container">
        
        <!-- 1. 지뢰찾기 게임 카드 -->
        <a href="games/minesweeper/minesweeper.html" class="game-card">
            <div class="game-icon">💣</div>
            <div class="game-title">MINESWEEPER</div>
            <div class="game-desc">지뢰찾기를 즐겨보세요.</div>
        </a>

        <!-- 2. 솔리테어 게임 카드 -->
        <a href="games/solitaire/solitaire.html" class="game-card">
            <div class="game-icon">♦️</div>
            <div class="game-title">SOLITAIRE</div>
            <div class="game-desc">SOLITAIRE 카드게임을 즐겨보세요.</div>
        </a>

        <!-- 3. 숫자 야구 게임 카드 -->
        <a href="games/baseball/baseball.html" class="game-card">
            <div class="game-icon">⚾</div>
            <div class="game-title">BASEBALL</div>
            <div class="game-desc">숫자 야구게임을 즐겨보세요.</div>
        </a>

        <!-- 4. 2048 게임 카드 -->
        <a href="games/num_2048/num_2048.html" class="game-card">
            <div class="game-icon">🧩</div>
            <div class="game-title">2048</div>
            <div class="game-desc">2048 숫자 퍼즐을 즐겨보세요.</div>
        </a>

        <a href="games/sudoku/sudoku.html" class="game-card">
            <div class="game-icon" style="color: #0081ff">➕</div>
            <div class="game-title">sudoku</div>
            <div class="game-desc">sudoku 퍼즐을 즐겨보세요.</div>
        </a>

    </main>

</body>
</html>
